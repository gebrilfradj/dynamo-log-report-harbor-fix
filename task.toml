artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["analyze", "transform"]
artifact_type = ["document_or_report"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Requires parsing structured log lines and deriving exact aggregate values without changing the input."
solution_explanation = "Read each non-empty log entry, count requests and distinct client IPs, tally request paths, and write the required JSON report."
verification_explanation = "Three pytest cases validate the JSON path and schema, aggregate request and client counts, and most-requested path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
